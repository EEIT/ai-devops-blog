# WARNING: baseURL must match the deployed site URL.
# Canonical URL, RSS guid, OG image absolute paths, and sitemap depend on it.
baseURL = "https://eeit.github.io/ai-devops-blog/"
languageCode = "zh-tw"
defaultContentLanguage = "zh-tw"
title = "AI 輔助維運工程"
theme = "PaperMod"

# Top-level copyright is rendered by PaperMod in the footer and reused in RSS.
copyright = "© 2026 鄧景仁 (Scott Teng) · 授權：[CC BY-NC 4.0](https://creativecommons.org/licenses/by-nc/4.0/deed.zh_TW)"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

pygmentsUseClasses = true

[minify]
  disableXML = true
  minifyOutput = true

[pagination]
  pagerSize = 10

[params]
  env = "production"
  title = "AI 輔助維運工程"
  description = "從 Claude Code 的運作機制，到企業導入的商務與技術治理"
  keywords = ["Claude Code", "AI 維運", "DevOps", "SRE", "AI 工程治理", "企業治理"]
  author = "鄧景仁 (Scott Teng)"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowToc = true
  TocOpen = false
  comments = false
  ShowRelated = true
  # Full-text RSS output.
  ShowFullTextinRSS = true
  # Contact mailbox for licensing and reposting inquiries.
  contactEmail = "st333117@gmail.com"
  # Plausible Analytics (無 cookie、無同意書); 使用 v2 site-specific script ID
  # 從 Plausible dashboard 的 snippet 中取得，URL 結構是 https://plausible.io/js/pa-<ID>.js
  plausibleSiteId = "QmUWlO5t0UQ3Vwh_2EfuS"
  # Google Search Console: 從 GSC「HTML 標籤」驗證方法的 content 值貼過來;空字串 = 不注入
  googleSiteVerification = "YSH50LPz5vy9C2GuFTKLRFE1EQrLdv1OLaKGPyheB30"
  # 社群分享預設卡片（放在 static/，部署後路徑 baseURL + defaultOgImage）
  defaultOgImage = "og-image.png"
  # 首頁 hero 圖片（空字串 = 不顯示）
  homeCoverImage = "og-image.png"

[params.schema]
  sameAs = ["https://github.com/EEIT"]

[params.homeInfoParams]
  Title = "AI 輔助維運工程系列"
  Content = "為 infra 工程師而寫的 Claude Code 深度系列。從機制理解到商務治理，繁體中文圈第一套系統性文章。"

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/EEIT/ai-devops-blog"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "categories"
    name = "分類"
    url = "/categories/"
    weight = 20
  [[menu.main]]
    identifier = "tags"
    name = "標籤"
    url = "/tags/"
    weight = 30
  [[menu.main]]
    identifier = "search"
    name = "搜尋"
    url = "/search/"
    weight = 40

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup.highlight]
  noClasses = false
  codeFences = true
  guessSyntax = true
  lineNos = false
  style = "monokai"

# 相關文章推薦 (PaperMod ShowRelated 需要這組 config 才會產出結果)
[related]
  includeNewer = true
  threshold = 80
  toLower = false

[[related.indices]]
  name = "tags"
  weight = 100

[[related.indices]]
  name = "categories"
  weight = 70
